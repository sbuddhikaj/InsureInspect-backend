# Server Port (Railway overrides this with its own PORT environment variable)
server.port=${PORT:8080}

# Database Connection (Uses local MySQL by default; overrides with environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/insureinspect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate JPA settings
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# S3 / MinIO Configuration (Overrides with environment variables in Railway/production)
aws.s3.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
aws.s3.access-key=${MINIO_ACCESS_KEY:minioadmin}
aws.s3.secret-key=${MINIO_SECRET_KEY:minioadmin}
aws.s3.bucket=${MINIO_BUCKET:insure-inspect}
aws.s3.region=${MINIO_REGION:us-east-1}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
